x-domain-events:
  publishedByUsersService:
    - eventType: UserDeactivated
      version: '1.0'
      exchange: facoffe.users.events
      routingKey: users.deactivated
      consumers:
        - Participation Service
      payloadExample:
        eventId: evt_001
        eventType: UserDeactivated
        occurredAt: '2026-05-19T13:00:00Z'
        version: '1.0'
        payload:
          userId: usr_123
          reason: Usuário não participa mais da copa

  publishedByParticipationService:
    - eventType: ParticipationQuotaCreated
      version: '1.0'
      exchange: facoffe.participation.events
      routingKey: quota.created
      consumers:
        - Reporting Service
      payloadExample:
        eventId: evt_010
        eventType: ParticipationQuotaCreated
        occurredAt: '2026-05-01T08:00:00Z'
        version: '1.0'
        payload:
          quotaId: quota_001
          name: Cota diária completa
          condition: DAILY
          items: ALL
          amount: 40.00
          createdBy: usr_manager_001
    - eventType: ParticipationJoined
      version: '1.0'
      exchange: facoffe.participation.events
      routingKey: participation.joined
      consumers:
        - Reporting Service
      payloadExample:
        eventId: evt_011
        eventType: ParticipationJoined
        occurredAt: '2026-05-02T10:00:00Z'
        version: '1.0'
        payload:
          participationId: part_001
          userId: usr_123
          quotaId: quota_001
          startCycle: '2026-05'
          quotaSnapshot:
            quotaId: quota_001
            name: Cota diária completa
            condition: DAILY
            items: ALL
            amount: 40.00
    - eventType: MonthlyParticipationGenerated
      version: '1.0'
      exchange: facoffe.participation.events
      routingKey: monthly-participation.generated
      consumers:
        - Finance Service
      payloadExample:
        eventId: evt_012
        eventType: MonthlyParticipationGenerated
        occurredAt: '2026-05-01T08:00:00Z'
        version: '1.0'
        payload:
          monthlyParticipationId: mpart_001
          participationId: part_001
          userId: usr_123
          quotaId: quota_001
          cycle: '2026-05'
          amount: 40.00
          description: Cota diária completa - Maio/2026
          quotaSnapshot:
            quotaId: quota_001
            name: Cota diária completa
            condition: DAILY
            items: ALL
            amount: 40.00
    - eventType: ParticipationCancelled
      version: '1.0'
      exchange: facoffe.participation.events
      routingKey: participation.cancelled
      consumers:
        - Finance Service
      payloadExample:
        eventId: evt_013
        eventType: ParticipationCancelled
        occurredAt: '2026-05-19T13:30:00Z'
        version: '1.0'
        payload:
          participationId: part_001
          userId: usr_123
          quotaId: quota_001
          effectiveCycle: '2026-06'
          reason: Participante deixou de usar a copa

  publishedByFinanceService:
    - eventType: FinancialPendencyCreated
      version: '1.0'
      exchange: facoffe.finance.events
      routingKey: financial-pendency.created
      consumers:
        - Notification Service
        - Reporting Service
      payloadExample:
        eventId: evt_020
        eventType: FinancialPendencyCreated
        occurredAt: '2026-05-01T08:10:00Z'
        version: '1.0'
        payload:
          pendencyId: pend_001
          source: MONTHLY_PARTICIPATION
          sourceId: mpart_001
          userId: usr_123
          cycle: '2026-05'
          amount: 40.00
          status: PENDING
    - eventType: PaymentProofSubmitted
      version: '1.0'
      exchange: facoffe.finance.events
      routingKey: payment-proof.submitted
      consumers:
        - Notification Service
        - Reporting Service
      payloadExample:
        eventId: evt_021
        eventType: PaymentProofSubmitted
        occurredAt: '2026-05-10T12:00:00Z'
        version: '1.0'
        payload:
          proofId: proof_001
          pendencyId: pend_001
          userId: usr_123
          amount: 40.00
          status: WAITING_VALIDATION
    - eventType: PaymentProofValidated
