      exchange: facoffe.finance.events
      routingKey: payment-proof.validated
      consumers:
        - Notification Service
        - Reporting Service
      payloadExample:
        eventId: evt_022
        eventType: PaymentProofValidated
        occurredAt: '2026-05-11T09:00:00Z'
        version: '1.0'
        payload:
          proofId: proof_001
          pendencyId: pend_001
          userId: usr_123
          amount: 40.00
          pendencyStatus: PAID
          validatedBy: usr_manager_001
    - eventType: ExpenseCreated
      version: '1.0'
      exchange: facoffe.finance.events
      routingKey: expense.created
      consumers:
        - Reporting Service
      payloadExample:
        eventId: evt_023
        eventType: ExpenseCreated
        occurredAt: '2026-05-08T15:00:00Z'
        version: '1.0'
        payload:
          expenseId: exp_001
          category: COFFEE
          amount: 85.90
          expenseDate: '2026-05-08'
          registeredBy: usr_manager_001
