    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3

    DeactivateUserRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
          example: Usuário não participa mais da copa

    ReplaceUserRolesRequest:
      type: object
      required: [roles]
      properties:
        roles:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/UserRole'

    User:
      type: object
      required: [id, name, email, status, roles, createdAt]
      properties:
        id:
          type: string
          example: usr_123
        name:
          type: string
          example: Maria Silva
        email:
          type: string
          format: email
          example: maria.silva@departamento.edu.br
        status:
          $ref: '#/components/schemas/UserStatus'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
        createdAt:
