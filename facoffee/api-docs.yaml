      properties:
        quotaId:
          type: string
          example: quota_001
        name:
          type: string
          example: Cota diária completa
        condition:
          $ref: '#/components/schemas/QuotaCondition'
        items:
          $ref: '#/components/schemas/QuotaItems'
        amount:
          type: number
          format: double
